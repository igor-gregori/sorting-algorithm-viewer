<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Sorting algorithm viewer</title>
    <link rel="icon" href="./icon.png" />
    <link rel="stylesheet" href="./style.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Roboto Mono"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="main" class="main">
      <div class="menu">
        <div class="menu-sa">
          <label for="algs">Choose an algorithm</label>
          <select name="algs" id="algs">
            <option value="bubble-sort" selected>Bubble Sort</option>
            <option value="insertion-sort">Insertion Sort</option>
            <option value="heap-sort">Heap Sort</option>
            <option value="merge-sort">Merge Sort</option>
            <option value="quick-sort">Quick Sort</option>
          </select>
        </div>
        <div class="btns">
          <div class="rand-div">
            <button class="rand-btn" id="rand-btn">Randomize</button>
          </div>
          <div class="play-div">
            <button class="play-btn" id="play-btn">Play</button>
          </div>
        </div>
      </div>
      <div id="board" class="board">
        <canvas class="canvas" id="canvas"></canvas>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
